services:
  app:
    volumes:
      - ..:/workspaces/PC3-CRUD-NODE-MONGODB:cached
    working_dir: /workspaces/PC3-CRUD-NODE-MONGODB
    command: sh -c "npm install && npm run start"
    environment:
      MONGO_HOST: mongo
      PORT: 3000
      SEED_ON_STARTUP: "true"

  mongo:
    ports:
      - "27017:27017"
